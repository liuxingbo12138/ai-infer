backend: sglang

model:
  path: /data/models/Qwen3-32B-FP8/checkpoints
  name: Qwen3-32B

server:
  host: "0.0.0.0"
  port: 8000
  health_check_interval: 5
  health_check_timeout: 600
  extra_args:
    - --reasoning-parser=qwen3
    - --kv-cache-dtype=fp8_e4m3
    - --tp-size=1
    - --trust-remote-code
    - --allow-auto-truncate
    - --enable-metrics
    - --enable-cache-report
    - --mem-fraction-static=0.93
    - --chunked-prefill-size=8192
    - --watchdog-timeout=7200
    - --enable-torch-compile
    - --torch-compile-max-bs=8
    - --disable-radix-cache

benchmark:
  seed: 12138
  rounds:
    - label: round1_prefill
      desc: "Prefill 压测 (长输入, 短输出)"
      input_len: 5500
      output_len: 1
      concurrency_list: [1, 2, 4, 8, 16, 32, 64, 128]
    - label: round2_decode
      desc: "Decode 压测 (短输入, 长输出)"
      input_len: 1
      output_len: 600
      concurrency_list: [1, 2, 4, 8, 16, 32, 64, 128]
    - label: round3_mixed
      desc: "混合压测 (长输入, 长输出)"
      input_len: 5500
      output_len: 600
      concurrency_list: [1, 2, 4, 8, 16, 32]

log_dir: logs/sglang
