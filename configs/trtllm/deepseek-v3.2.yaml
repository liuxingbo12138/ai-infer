backend: trtllm

model:
  path: /data/models/DeepSeek-V3.2/checkpoints
  name: DeepSeek-V3.2

server:
  host: "0.0.0.0"
  port: 8000
  health_check_interval: 5
  health_check_timeout: 600
  # trtllm 额外配置文件内容 (会写入 session 目录的 trtllm_config.yaml)
  config_arg: "--config"   # 老版用 --extra_llm_api_options, 新版用 --config
  config_yaml: |
    enable_attention_dp: true

    attention_dp_config:
      batching_wait_iters: 0
      enable_balance: true
      timeout_iters: 60

    kv_cache_config:
      dtype: fp8
      free_gpu_memory_fraction: 0.8
      enable_block_reuse: false

    cuda_graph_config:
      enable_padding: true
      max_batch_size: 128

    stream_interval: 10

    speculative_config:
      decoding_type: MTP
      num_nextn_predict_layers: 1

    moe_config:
      backend: TRTLLM

  extra_args:
    - --tp_size=8
    - --ep_size=8
    - --pp_size=1
    - --max_batch_size=1024
    - --max_num_tokens=3200
    - --custom_tokenizer=deepseek_v32
    - --trust_remote_code

benchmark:
  seed: 12138
  rounds:
    - label: round1_prefill
      desc: "Prefill 压测 (长输入, 短输出)"
      input_len: 5500
      output_len: 1
      concurrency_list: [1, 2, 4, 8, 16, 32, 64]
    - label: round2_decode
      desc: "Decode 压测 (短输入, 长输出)"
      input_len: 1
      output_len: 600
      concurrency_list: [1, 2, 4, 8, 16, 32, 64, 128]
    - label: round3_mixed
      desc: "混合压测 (长输入, 长输出)"
      input_len: 5500
      output_len: 600
      concurrency_list: [1, 2, 4, 8, 16, 32, 64]

log_dir: logs/trtllm
