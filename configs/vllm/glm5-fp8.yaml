backend: vllm

model:
  path: /data/models/GLM-5-FP8/checkpoints
  name: GLM-5-FP8

server:
  host: "0.0.0.0"
  port: 8000
  health_check_interval: 5
  health_check_timeout: 3600
  cuda_visible_devices: "0,1,2,3,4,5,6,7"
  extra_args:
    - --trust-remote-code
    - --reasoning-parser=glm45
    - --tensor-parallel-size=8
    - --all2all-backend=pplx
    - --kv-cache-dtype=fp8_ds_mla
    - --speculative-config.method=mtp
    - --speculative-config.num_speculative_tokens=1
    - --max-model-len=6144
    - --max-num-batched-tokens=4096
    - --enable-chunked-prefill
    - --gpu-memory-utilization=0.9
    - --max-num-seqs=64
    - --no-disable-nccl-for-dp-synchronization

benchmark:
  seed: 12138
  rounds:
    - label: round1_prefill
      desc: "Prefill 压测 (长输入, 短输出)"
      input_len: 5500
      output_len: 1
      concurrency_list: [1, 2, 4, 8, 16, 32, 64]
    - label: round2_decode
      desc: "Decode 压测 (短输入, 长输出)"
      input_len: 1
      output_len: 600
      concurrency_list: [1, 2, 4, 8]
    - label: round3_mixed
      desc: "混合压测 (长输入, 长输出)"
      input_len: 5500
      output_len: 600
      concurrency_list: [1, 2, 4, 8, 16, 32]

log_dir: logs/vllm
