backend: vllm

model:
  path: /data/models/Qwen3-32B-FP8/checkpoints
  name: Qwen3-32B

server:
  host: "0.0.0.0"
  port: 8000
  health_check_interval: 5
  health_check_timeout: 600
  extra_args:
    - --trust-remote-code
    - --reasoning-parser=qwen3
    - --tensor-parallel-size=1
    - --kv-cache-dtype=fp8_e4m3
    - --max-model-len=6144
    - --max-num-seqs=2048
    - --max-num-batched-tokens=8192
    - --enable-chunked-prefill
    - --gpu-memory-utilization=0.95

benchmark:
  seed: 12138
  rounds:
    - label: round1_prefill
      desc: "Prefill 压测 (长输入, 短输出)"
      input_len: 5500
      output_len: 1
      concurrency_list: [1]
    - label: round2_decode
      desc: "Decode 压测 (短输入, 长输出)"
      input_len: 1
      output_len: 600
      concurrency_list: [64, 128, 256]
    - label: round3_mixed
      desc: "混合压测 (长输入, 长输出)"
      input_len: 5500
      output_len: 600
      concurrency_list: [1]

log_dir: logs/vllm
